trigger:
- main

pool:
  vmImage: 'ubuntu-latest'

variables:
  IMAGE_NAME: java-app

steps:

# ✅ Step 1: Build Java project
- task: Maven@4
  inputs:
    mavenPomFile: 'pom.xml'
    goals: 'clean package'

# ✅ Step 2: Check JAR file (debug)
- script: |
    ls -l target/
  displayName: Check JAR File

# ✅ Step 3: Build Docker image
- script: |
    docker build -t $(IMAGE_NAME) .
  displayName: Build Docker Image

# ✅ Step 4: Verify Docker image
- script: |
    docker images
  displayName: Show Docker Images
# ✅ Step 1: Build Java project
- task: Maven@3
  inputs:
    mavenPomFile: 'pom.xml'
    goals: 'clean package'

# ✅ Step 2: Build Docker image
- script: |
    docker build -t $(IMAGE_NAME) .
  displayName: Build Docker Image

# ✅ Step 3: Show Docker images (verification)
- script: |
    docker images
  displayName: Show Docker Images
