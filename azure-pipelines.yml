trigger:
- main

pool:
  vmImage: 'ubuntu-latest'

variables:
- group: aws-credentials   # ✅ link variable group
- name: IMAGE_NAME
  value: java-app

steps:

# ✅ Build Java
- task: Maven@4
  inputs:
    mavenPomFile: 'pom.xml'
    goals: 'clean package'

# ✅ Build Docker
- script: |
    docker build -t $(IMAGE_NAME) .
  displayName: Build Docker

# ✅ Configure AWS
- script: |
    aws configure set aws_access_key_id $(AWS_ACCESS_KEY)
    aws configure set aws_secret_access_key $(AWS_SECRET_KEY)
    aws configure set default.region $(AWS_REGION)
  displayName: Configure AWS

# ✅ Login to ECR
- script: |
    aws ecr get-login-password --region $(AWS_REGION) \
    | docker login --username AWS --password-stdin $(ACCOUNT_ID).dkr.ecr.$(AWS_REGION).amazonaws.com
  displayName: Login to ECR

# ✅ Tag image
- script: |
    docker tag $(IMAGE_NAME) $(ACCOUNT_ID).dkr.ecr.$(AWS_REGION).amazonaws.com/$(IMAGE_NAME)
  displayName: Tag Image

# ✅ Push image
- script: |
    docker push $(ACCOUNT_ID).dkr.ecr.$(AWS_REGION).amazonaws.com/$(IMAGE_NAME)
  displayName: Push Image
